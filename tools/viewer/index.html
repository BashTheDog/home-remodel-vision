<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3DGS Room Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
    #viewport { width: 100vw; height: 100vh; display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex; align-items: center; gap: 16px; pointer-events: none;
    }
    #hud h1 { font-size: 14px; font-weight: 600; }
    #status { font-size: 12px; opacity: 0.7; }
    #controls {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 11px; opacity: 0.5; text-align: center; pointer-events: none;
    }
    #loading-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111; z-index: 10;
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    #progress-bar-wrap {
      width: 300px; height: 4px; background: #333; border-radius: 2px; margin-top: 20px;
    }
    #progress-bar { height: 100%; background: #76b900; border-radius: 2px; width: 0%; transition: width 0.2s; }
    #progress-text { margin-top: 8px; font-size: 12px; opacity: 0.6; }
  </style>

  <!-- Import map: redirect bare 'three' specifier to our self-hosted copy -->
  <script type="importmap">
  {
    "imports": {
      "three": "./three.module.js",
      "three/addons/": "./addons/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <h1>3DGS Viewer</h1>
    <span id="status">Loading…</span>
  </div>
  <div id="controls">Drag to orbit &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Right-drag to pan</div>
  <div id="loading-overlay">
    <div style="font-size:18px; font-weight:600;">Loading point cloud…</div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <div id="progress-text">Fetching bedroom1.ply</div>
  </div>

  <script type="module">
    import * as GaussianSplats3D from './gaussian-splats-3d.module.js';

    const status  = document.getElementById('status');
    const overlay = document.getElementById('loading-overlay');
    const pbar    = document.getElementById('progress-bar');
    const ptxt    = document.getElementById('progress-text');

    function fmt(bytes) {
      if (bytes < 1e6) return (bytes/1e3).toFixed(0) + ' KB';
      return (bytes/1e6).toFixed(0) + ' MB';
    }

    const viewer = new GaussianSplats3D.Viewer({
      selfDrivenMode: true,
      sharedMemoryForWorkers: false,
      dynamicScene: false,
      webXRMode: GaussianSplats3D.WebXRMode.None,
      renderMode: GaussianSplats3D.RenderMode.OnChange,
    });

    viewer.addSplatScene('./scene.ply', {
      splatAlphaRemovalThreshold: 5,
      onProgress: (percent, message, phase) => {
        if (percent !== null) {
          pbar.style.width = percent + '%';
          ptxt.textContent = `${phase || ''} — ${percent.toFixed(0)}%`;
        }
      },
    })
    .then(() => {
      overlay.classList.add('hidden');
      status.textContent = `Ready`;
      viewer.start();
    })
    .catch(err => {
      ptxt.textContent = 'Error: ' + err.message;
      status.textContent = 'Load failed';
      console.error(err);
    });
  </script>
</body>
</html>
